<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yami Mammy</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #0a1f44, #020b1c);
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #ff7a00;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.recipe {
  background: #111;
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Yami Mammy</h1>

  <input id="title" placeholder="שם מתכון">
  <textarea id="ingredients" placeholder="רכיבים"></textarea>
  <textarea id="steps" placeholder="הוראות הכנה"></textarea>

  <button onclick="saveRecipe()">שמור מתכון</button>

  <div id="recipes"></div>
</div>

<script>
function saveRecipe() {
  const title = document.getElementById('title').value;
  const ingredients = document.getElementById('ingredients').value;
  const steps = document.getElementById('steps').value;

  if (!title) return;

  const recipe = { title, ingredients, steps };

  let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
  recipes.push(recipe);
  localStorage.setItem('recipes', JSON.stringify(recipes));

  renderRecipes();
}

function renderRecipes() {
  const container = document.getElementById('recipes');
  container.innerHTML = '';

  const recipes = JSON.parse(localStorage.getItem('recipes') || '[]');

  recipes.forEach(r => {
    const div = document.createElement('div');
    div.className = 'recipe';
    div.innerHTML = `
      <h3>${r.title}</h3>
      <p><b>רכיבים:</b> ${r.ingredients}</p>
      <p><b>הכנה:</b> ${r.steps}</p>
    `;
    container.appendChild(div);
  });
}

renderRecipes();
</script>

</body>
</html>
